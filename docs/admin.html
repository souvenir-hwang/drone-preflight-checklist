<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>드론 점검 관리</title>
<style>
  :root{
    --blue:#1428A0; --bg:#f2f4f8; --card:#ffffff; --line:#e2e6ee; --txt:#1c2333; --muted:#6b7280;
  }
  *{box-sizing:border-box;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    margin:0;background:var(--bg);color:var(--txt);font-size:14px;
  }
  header{background:var(--blue);color:#fff;padding:14px 18px;}
  header h1{margin:0;font-size:17px;}
  header .sub{font-size:12px;opacity:.85;margin-top:3px;}
  .wrap{max-width:640px;margin:0 auto;padding:16px;}
  .card{
    display:block;background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:18px;margin-bottom:12px;text-decoration:none;color:var(--txt);
    box-shadow:0 1px 3px rgba(0,0,0,.05);
  }
  .card:active{background:#f5f7ff;}
  .card .t{font-size:15px;font-weight:700;color:var(--blue);margin-bottom:4px;}
  .card .d{font-size:12.5px;color:var(--muted);}
</style>
</head>
<body>
<header>
  <h1>🛠️ 드론 점검 관리</h1>
  <div class="sub">드론 목록 · 체크리스트 항목 · 점검 기록 현황</div>
</header>
<div class="wrap" id="wrap" style="display:none;">
  <a class="card" href="admin-drones.html">
    <div class="t">🚁 드론 목록 관리</div>
    <div class="d">점검 화면 드론 선택 드롭다운에 나올 목록을 추가·수정·삭제합니다.</div>
  </a>
  <a class="card" href="admin-items.html">
    <div class="t">📋 체크리스트 항목 관리</div>
    <div class="d">20개 점검 항목의 질문·설명을 추가·수정·삭제·순서변경합니다.</div>
  </a>
  <a class="card" href="reports.html">
    <div class="t">📊 점검 기록 현황</div>
    <div class="d">지금까지 저장된 점검 기록을 조회·삭제·엑셀 다운로드합니다.</div>
  </a>
</div>

<script src="admin-common.js"></script>
<script>
adminGate(()=>{ document.getElementById('wrap').style.display='block'; });
</script>
</body>
</html>
